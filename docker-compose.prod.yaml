services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data:/data:rw
    ports:
      - "5432:5432"           # <-- add this so you can psql from host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    env_file: .env            # contains DATABASE_URL (see below)
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PYTHONPATH=/app
      - TZ=America/New_York
      # (optional) fallback if not in .env:
      # - DATABASE_URL=postgresql+psycopg://app:secret@db:5432/appdb
    volumes:
      - ./data/in:/data/in:ro
      - ./data/out:/data/out
    working_dir: /app
    # Run migrations, then boot API
    command: ["/app/entrypoint.sh"]   # <-- new
    ports:
      - "8000:8000"

volumes:
  pgdata:

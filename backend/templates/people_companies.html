{% extends "base.html" %}
{% block content %}

<h1 style="margin:0;">{{ Companies }}</h1>

<table class="table">
  <tbody>
    {% for c in companies %}
      {% set company_name = c.company if c.company is defined else c %}
      <tr>
        <td>
          <a href="/people?company={{ company_name }}">{{ company_name }}</a>
        </td>
        <td></td>
      </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}

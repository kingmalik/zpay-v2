<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/css/main.css">
  <script defer src="/static/js/inline-edit.js"></script>
  <title>{% block title %}Z-Pay{% endblock %}</title>
</head>

<body>
  <div class="zpay-layout">

    <!-- Header -->
    <header class="zpay-header">
      <a class="zpay-wordmark" href="/summary">Z<span>-Pay</span></a>
      <nav class="zpay-nav">
        <a href="/people">People</a>
        <a href="/summary">Summary</a>
        <a href="/dispatch">Dispatch</a>
        <a href="/dispatch/assign">Assign</a>
        <a href="/upload">Upload</a>
        <a href="/docs">API</a>
      </nav>
    </header>

    <!-- Page title -->
    {% if self.page_title()|trim %}
    <div class="zpay-page-header">
      <h1>{% block page_title %}{% endblock %}</h1>
      <p>{% block subtitle %}{% endblock %}</p>
    </div>
    {% endif %}

    <!-- Page content -->
    <div class="glass-card">
      {% block content %}{% endblock %}
    </div>

  </div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/css/main.css">
  <script defer src="/static/js/inline-edit.js"></script>
  <title>{% block title %}Z-Pay{% endblock %}</title>
</head>

<body>
  <div class="zpay-layout">

    <!-- Header -->
    <header class="zpay-header">
      <a class="zpay-wordmark" href="/summary">Z<span>-Pay</span></a>
      <nav class="zpay-nav">
        <a href="/people">People</a>
        <a href="/summary">Summary</a>
        <a href="/analytics">Analytics</a>
        <a href="/dispatch">Dispatch</a>
        <a href="/dispatch/assign">Assign</a>
        <a href="/batches">Batches</a>
        <a href="/upload">Upload</a>
        <a href="/docs">API</a>
        <a href="/alerts" id="nav-alerts" style="position:relative;display:inline-flex;align-items:center;gap:6px;">
          Alerts
          <span id="alert-badge" style="
            display:none;
            min-width:18px;height:18px;
            padding:0 5px;
            border-radius:999px;
            background:#ef4444;
            color:#fff;
            font-size:10px;
            font-weight:700;
            line-height:18px;
            text-align:center;
            box-shadow:0 0 8px rgba(239,68,68,0.7);
            animation:alert-pulse 2s ease-in-out infinite;
          "></span>
        </a>
      </nav>
    </header>

    <style>
      @keyframes alert-pulse {
        0%,100% { box-shadow:0 0 6px rgba(239,68,68,0.6); }
        50%      { box-shadow:0 0 14px rgba(239,68,68,0.95); }
      }
    </style>
    <script>
      (function () {
        fetch('/alerts/data')
          .then(function (r) { return r.json(); })
          .then(function (d) {
            if (d.total > 0) {
              var badge = document.getElementById('alert-badge');
              badge.textContent = d.total;
              badge.style.display = 'inline-block';
            }
          })
          .catch(function () {});
      })();
    </script>

    <!-- Page title -->
    {% if self.page_title()|trim %}
    <div class="zpay-page-header">
      <h1>{% block page_title %}{% endblock %}</h1>
      <p>{% block subtitle %}{% endblock %}</p>
    </div>
    {% endif %}

    <!-- Page content -->
    <div class="glass-card">
      {% block content %}{% endblock %}
    </div>

  </div>
</body>
</html>

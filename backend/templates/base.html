<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/css/zpay-light.css">
  <script defer src="/static/js/inline-edit.js"></script>
  <title>{% block title %}Z-Pay{% endblock %}</title>
  {% block styles %}{% endblock %}
</head>

<body>

  <!-- ── Top Navigation ──────────────────────────────────────── -->
  <nav class="zpay-nav">
    <div class="zpay-nav__inner">

      <!-- Logo -->
      <a href="/summary" class="zpay-nav__logo">Z-<span>Pay</span></a>

      <!-- Center nav links -->
      <ul class="zpay-nav__links">
        <li>
          <a href="/summary" class="zpay-nav__link {% if request.url.path == '/summary' or request.url.path == '/' %}active{% endif %}">Dashboard</a>
        </li>
        <li>
          <a href="/payroll/history" class="zpay-nav__link {% if request.url.path.startswith('/payroll') %}active{% endif %}">Payroll</a>
        </li>
        <li>
          <a href="/upload" class="zpay-nav__link {% if request.url.path == '/upload' %}active{% endif %}">Upload</a>
        </li>
        <li>
          <a href="/batches" class="zpay-nav__link {% if request.url.path.startswith('/batches') %}active{% endif %}">Batches</a>
        </li>
        <li>
          <a href="/people" class="zpay-nav__link {% if request.url.path.startswith('/people') %}active{% endif %}">People</a>
        </li>
        <li>
          <a href="/dispatch" class="zpay-nav__link {% if request.url.path.startswith('/dispatch') %}active{% endif %}">Dispatch</a>
        </li>
        <li>
          <a href="/intelligence" class="zpay-nav__link {% if request.url.path.startswith('/intelligence') %}active{% endif %}">Intelligence</a>
        </li>
        <li>
          <a href="/validate" class="zpay-nav__link {% if request.url.path == '/validate' %}active{% endif %}">Validation</a>
        </li>
        <li>
          <a href="/admin/rates" class="zpay-nav__link {% if request.url.path.startswith('/admin/rates') %}active{% endif %}">Rates</a>
        </li>
      </ul>

      <!-- Right side: alerts + avatar -->
      <div class="zpay-nav__right">
        <a href="/alerts" class="zpay-nav__alert-btn" id="nav-alerts-btn" title="Alerts">
          🔔
          <span class="zpay-nav__badge" id="alert-badge" style="display:none;"></span>
        </a>
        <div class="zpay-nav__avatar">ZP</div>
      </div>

    </div>
  </nav>

  <!-- ── Page Content ─────────────────────────────────────────── -->
  <main class="zpay-page">
    {% block content %}{% endblock %}
  </main>

  <!-- ── Alert badge fetch ──────────────────────────────────── -->
  <script>
    (function () {
      fetch('/alerts/data')
        .then(function (r) { return r.json(); })
        .then(function (d) {
          if (d.total > 0) {
            var badge = document.getElementById('alert-badge');
            if (badge) { badge.style.display = 'block'; }
          }
        })
        .catch(function () {});
    })();
  </script>

  <!-- ── KPI counter animation ─────────────────────────────── -->
  <script>
  function animateCount(el) {
    const target = parseFloat(el.dataset.target || el.textContent.replace(/[^0-9.]/g, ''));
    const prefix = el.dataset.prefix || '';
    const suffix = el.dataset.suffix || '';
    const duration = 500;
    const start = performance.now();
    const step = (now) => {
      const p = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      const val = target * ease;
      el.textContent = prefix + (Number.isInteger(target) ? Math.round(val).toLocaleString() : val.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})) + suffix;
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.kpi-count').forEach(animateCount);
  });
  </script>

  {% block scripts %}{% endblock %}

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/css/zpay-light.css?v=20260404g">
  <title>Login — Z-Pay</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: var(--font-sans);
      overflow: hidden;
    }

    /* Animated gradient background */
    .login-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #667eea 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating orbs */
    .login-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: orbFloat 20s ease-in-out infinite;
      z-index: 1;
    }
    .login-orb--1 {
      width: 400px; height: 400px;
      background: rgba(102, 126, 234, 0.6);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }
    .login-orb--2 {
      width: 300px; height: 300px;
      background: rgba(240, 147, 251, 0.5);
      bottom: -50px; right: -50px;
      animation-delay: -7s;
    }
    .login-orb--3 {
      width: 250px; height: 250px;
      background: rgba(79, 172, 254, 0.4);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -14s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25%      { transform: translate(30px, -40px) scale(1.1); }
      50%      { transform: translate(-20px, 20px) scale(0.9); }
      75%      { transform: translate(40px, 10px) scale(1.05); }
    }

    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      margin: 0 20px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.12),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
      animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo span {
      display: inline-block;
      font-size: 48px;
      font-weight: 800;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }
    .login-logo small {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .login-field {
      position: relative;
      margin-bottom: 24px;
    }
    .login-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .login-field input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 15px;
      font-family: var(--font-sans);
      outline: none;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    .login-field input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }
    .login-field input:focus {
      border-color: rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.3px;
    }
    .login-btn:hover {
      background: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }
    .login-btn:active {
      transform: translateY(0);
    }

    .login-error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      color: #fecaca;
      font-size: 13px;
      font-weight: 500;
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      animation: particleFloat linear infinite;
    }

    @keyframes particleFloat {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="login-bg"></div>
  <div class="login-orb login-orb--1"></div>
  <div class="login-orb login-orb--2"></div>
  <div class="login-orb login-orb--3"></div>

  <!-- Particles -->
  <div class="particles">
    <div class="particle" style="left:10%; animation-duration:12s; animation-delay:0s; width:3px; height:3px;"></div>
    <div class="particle" style="left:20%; animation-duration:15s; animation-delay:2s;"></div>
    <div class="particle" style="left:35%; animation-duration:10s; animation-delay:4s; width:5px; height:5px;"></div>
    <div class="particle" style="left:50%; animation-duration:18s; animation-delay:1s;"></div>
    <div class="particle" style="left:65%; animation-duration:13s; animation-delay:3s; width:3px; height:3px;"></div>
    <div class="particle" style="left:80%; animation-duration:16s; animation-delay:5s;"></div>
    <div class="particle" style="left:90%; animation-duration:11s; animation-delay:2s; width:6px; height:6px;"></div>
    <div class="particle" style="left:5%; animation-duration:14s; animation-delay:6s;"></div>
    <div class="particle" style="left:45%; animation-duration:17s; animation-delay:0s; width:3px; height:3px;"></div>
    <div class="particle" style="left:75%; animation-duration:12s; animation-delay:4s;"></div>
  </div>

  <div class="login-card">
    <div class="login-logo">
      <span>Z-Pay</span>
      <small>Transportation Payroll</small>
    </div>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="login-field">
        <label>Username</label>
        <input
          type="text"
          name="username"
          placeholder="Enter your username"
          required
          autofocus
          autocomplete="username"
        />
      </div>
      <div class="login-field">
        <label>Password</label>
        <input
          type="password"
          name="password"
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        />
      </div>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
</body>
</html>

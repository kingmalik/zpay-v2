<!doctype html>
<html>
<head>
  <title>Rates</title>
  <style>
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    input[type="text"] { width: 110px; }
  </style>
</head>
<body>
  <div style="margin-bottom: 16px;">
    <a href="/upload">⬆ Upload</a>
    &nbsp; | &nbsp;
    <a href="/summary?source={{ source }}&company_name={{ company_name }}">📊 Summary</a>
    &nbsp; | &nbsp;
    <strong>💲 Rates</strong>
  </div>

  <form method="get" action="/admin/rates">
    <label>Source</label>
    <input name="source" value="{{ source }}" />
    <label>Company</label>
    <input name="company_name" value="{{ company_name }}" />
    <button type="submit">Filter</button>
  </form>
  <form method="post" action="/admin/rates/recalculate" style="display:inline-block; margin-left: 12px;">
  <input type="hidden" name="source" value="{{ source }}">
  <input type="hidden" name="company_name" value="{{ company_name }}">
  <button type="submit">Recalculate summary</button>
</form>

  <table>
    <thead>
      <tr>
        <th>Service Name</th>
        <th>Z-Rate</th>
        <th>Default Rate</th>
        <th>Overrides</th>
      </tr>
    </thead>
    <tbody>
      {% for s in services %}
      <tr>
        <td>{{ s.service_name }}</td>
        <td>
            {{ "%.2f"|format(s.default_rate) if s.default_rate is not none else "—" }}
        </td>
        <td>
          <form method="post" action="/admin/rates/{{ s.z_rate_service_id }}/set-default" style="display:flex; gap:8px; align-items:center;">
            <input type="hidden" name="source" value="{{ source }}">
            <input type="hidden" name="company_name" value="{{ company_name }}">

            <input
              type="number"
              name="default_rate"
              step="0.01"
              min="0"
              value="{{ '%.2f'|format(s.default_rate) if s.default_rate is not none else '' }}"
              placeholder="Set rate"
              style="width:120px;"
            />

            <button type="submit">Save</button>
        </form>
        </td>
        <td>
          <td>
            <a href="/admin/rates/{{ s.z_rate_service_id }}/overrides">Manage</a>
          </td>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>

<!doctype html>
<html>
<head><title>Overrides</title></head>
<body>
  <a href="/admin/rates?source={{ svc.source }}&company_name={{ svc.company_name }}">← Back</a>
  <h2>Overrides: {{ svc.service_name }}</h2>
  <p>Default rate: {{ svc.default_rate }}</p>

  <h3>Add override</h3>
  <form method="post" action="/admin/rates/{{ svc.z_rate_service_id }}/overrides/add">
    <label>Start</label>
    <input type="date" name="effective_start" required>
    <label>End</label>
    <input type="date" name="effective_end" required>
    <label>Rate</label>
    <input type="text" name="rate" required>
    <label>Currency</label>
    <input type="text" name="currency" value="{{ svc.currency }}">
    <label>Note</label>
    <input type="text" name="note">
    <button type="submit">Add</button>
  </form>

  <h3>Existing overrides</h3>
  <table border="1" cellpadding="6">
    <tr><th>Start</th><th>End</th><th>Rate</th><th>Currency</th><th>Active</th><th>Note</th></tr>
    {% for o in overrides %}
    <tr>
      <td>{{ o.effective_start }}</td>
      <td>{{ o.effective_end }}</td>
      <td>{{ o.rate }}</td>
      <td>{{ o.currency }}</td>
      <td>{{ o.active }}</td>
      <td>{{ o.note or "" }}</td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>

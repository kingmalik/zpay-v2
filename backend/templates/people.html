{% extends "base.html" %}
{% block content %}
<h1>Weeks</h1>
<p>Select a week.</p>

<table class="table">
  <thead>
    <tr>
      <th>Week</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for w in weeks %}
      <tr>
        <td>{{ w.week_start|mmddyyyy }} - {{ w.week_end|mmddyyyy }}</td>
        <td>
          <a href="/people/?week_start={{ w.week_start }}&week_end={{ w.week_end }}">view</a>
        </td>
      </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

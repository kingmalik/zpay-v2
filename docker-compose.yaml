services:
  app:
    build: .
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - TZ=America/New_York
      - RUN_Z_RATE_UPSERT=0
      - Z_RATE_ACCUMEN_CSV_PATH=/data/in/acumen.rates.csv
      - Z_RATE_ACUMMEN_SOURCE=acumen
      - Z_RATE_COMPANY_NAME_ACCUMEN=FirstAlt
      - Z_RATE_MAZ_CSV_PATH=/data/in/maz.rates.csv
      - Z_RATE_MAZ_SOURCE=maz
      - Z_RATE_COMPANY_NAME_MAZ=EverDriven
      - VALIDATE_PATH=/data/in/validate
    volumes:
      - ./data/in:/data/in:ro
      - ./data/in/validate:/data/in/validate:ro
      - ./data/out:/data/out
      - playwright_cache:/root/.cache/ms-playwright
    working_dir: /app
    command: ["sh","/entrypoint.sh"]
    ports:
      - "8000:8000"

volumes:
  playwright_cache:

<!doctype html><html><body>
<h1>Payroll Ingest</h1>

<h3>1) Upload batch PDF</h3>
<form action="/upload" method="post" enctype="multipart/form-data">
  <input type="file" name="file" accept="application/pdf" required>
  <button type="submit">Upload & Process</button>
</form>

<h3>2) Browse</h3>
<ul>
  <li><a href="/people">People</a></li>
  <li><a href="/rides">Rides (latest)</a></li>
  <li><a href="/summary">Weekly Summary</a></li>
</ul>

<h3>3) Add finder’s fee rule</h3>
<form action="/rules/finder_fee" method="post">
  <label>Person ID (blank=global): <input type="number" name="person_id"></label><br>
  <label>Percent (e.g. 0.15): <input type="number" step="0.0001" name="pct" required></label><br>
  <label>Effective From (YYYY-MM-DD): <input type="date" name="effective_from" required></label><br>
  <button type="submit">Save Rule</button>
</form>

<h3>4) Export per-employee CSVs</h3>
<a href="/export/csv">Generate & Download ZIP</a>
</body></html>
